name: mars-rover-task-scheduler
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent acts as mission control for a Mars rover,
  scheduling science tasks across Martian sols while managing battery levels, daylight
  windows, dust storms, and system anomalies. Inspired by real NASA Perseverance
  rover operations at Jezero Crater.

author: Satyam Gupta
tags:
  - openenv
  - space
  - scheduling
  - resource-management
  - real-world
  - nasa
  - robotics

tasks:
  - id: easy
    name: Single Sol Optimization
    difficulty: easy
    description: >
      Schedule one Martian day of rover activities. Battery starts at 600Wh,
      daylight lasts 12 hours. Maximize science return without depleting battery below 100Wh.

  - id: medium
    name: Dust Storm Survival Mission
    difficulty: medium
    description: >
      Plan 5 Martian sols during a regional dust storm that cuts solar efficiency by 60%.
      Battery management becomes critical. Prioritize survival and key science.
      Communications window opens mid-mission at Sol 3.

  - id: hard
    name: Anomaly Recovery and Science Maximization
    difficulty: hard
    description: >
      Mid-mission a motor anomaly disables navigation. Diagnose, enter safe mode,
      recover, then maximize remaining science over 7 sols with degraded capabilities.

observation_space:
  sol: integer  # Current Martian day
  battery_level: float  # Wh, range 0–1000
  daylight_remaining: float  # Hours of daylight left this sol
  comms_window_open: boolean
  comms_window_hours_remaining: float
  solar_efficiency: float  # 0.0–1.0
  available_tasks: list[ScienceTask]
  completed_tasks: list[string]
  total_science_collected: float
  anomaly_active: boolean
  anomaly_type: string | null
  dust_storm_active: boolean
  mission_sol_limit: integer

action_space:
  task_id: string  # ID from available_tasks, or "wait" / "charge"
  notes: string  # optional agent reasoning

reward_range: [0.01, 0.99]

endpoints:
  reset: POST /reset/{task_id}
  step: POST /step/{task_id}
  state: GET /state/{task_id}
  tasks: GET /tasks
  grader: POST /grader/{task_id}
  baseline: POST /baseline
  nasa: GET /nasa

docker:
  base_image: python:3.11-slim
  port: 7860

huggingface:
  space_type: docker
  sdk: docker
