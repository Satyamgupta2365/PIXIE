name: pixel-mars-rover
version: "1.0.0"
description: >
  PIXEL — An OpenEnv-compatible Mars Rover RL environment where an LLM agent
  controls a rover using natural language, managing battery, science collection,
  weather conditions, anomalies, and communication windows across 100 Martian sols.

author: Satyam Gupta
tags:
  - openenv
  - space
  - mars
  - reinforcement-learning
  - natural-language
  - resource-management
  - robotics

tasks:
  - id: easy
    name: Standard Mars Mission
    difficulty: easy
    description: >
      Survive 100 Martian sols with favorable conditions. Manage battery,
      collect science, and handle occasional weather changes and anomalies.

  - id: medium
    name: Dust Storm Survival
    difficulty: medium
    description: >
      Navigate through frequent dust storms that cut solar efficiency.
      Battery management becomes critical. Prioritize survival and science.

  - id: hard
    name: Extreme Conditions Challenge
    difficulty: hard
    description: >
      Survive extreme Mars conditions with frequent anomalies, dust storms,
      and limited comm windows. Every decision counts.

observation_space:
  sol: integer                          # Current Mars day (0-100)
  battery: float                        # 0.0 to 1.0
  science_collected: float              # Cumulative science points
  tasks_available: list[string]         # e.g. ["drill", "image", "soil_sample"]
  weather: string                       # "clear" | "dust_storm" | "low_visibility"
  anomaly_active: boolean               # Random fault triggered
  comm_window_open: boolean             # Can transmit data to Earth
  solar_efficiency: float               # 0.0 to 1.0, drops during dust storm
  mission_phase: string                 # "surface_ops" | "crisis" | "charging"

action_space:
  action: string                        # Natural language command
  valid_intents:
    - drill
    - image
    - soil_sample
    - charge
    - safe_mode
    - transmit

reward_range: [-1.0, 1.0]

endpoints:
  reset: POST /reset/{task_id}
  step: POST /step/{task_id}
  state: GET /state/{task_id}
  tasks: GET /tasks
  grader: POST /grader/{task_id}
  health: GET /health

docker:
  base_image: python:3.11-slim
  port: 7860

huggingface:
  space_type: docker
  sdk: docker
